  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#FAF7F2', surface: '#FFFFFF',
            ink: '#1C1A17', 'ink-soft': '#56504A',
            accent: '#C2410C', hairline: '#E7E1D8',
            'band-excellent': '#1B7A4B', 'band-good': '#5FA855',

  <style>
    body { background: #FAF7F2; font-family: 'Public Sans', system-ui, sans-serif; }
    .font-display { font-family: 'Fraunces', Georgia, serif; }
    .text-display { font-size: 3rem;    line-height: 1.1; }
    .text-h1      { font-size: 1.75rem; line-height: 1.2; }
    .text-h2      { font-size: 1.25rem; line-height: 1.3; }
    .text-small   { font-size: .875rem; line-height: 1.5; }
    .text-micro   { font-size: .75rem;  line-height: 1.4; }
    .rounded-card { border-radius: 12px; }
    .rounded-pill { border-radius: 999px; }
    .max-w-content { max-width: 720px; }
    .wordmark:hover { color: #C2410C; }
    .btn-link { text-decoration: none; transition: opacity 150ms; }
    .btn-link:hover { opacity: .9; }
    .footer-link { color: #C2410C; text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }
    .source-link { color: #C2410C; text-decoration: none; }
    .source-link:hover { text-decoration: underline; }
    .card-link { display: flex; text-decoration: none; transition: border-color 150ms; }
    .card-link:hover { border-color: #C2410C !important; }
    /* Ingredient list */
    .ingredient-list { border: 1px solid #E7E1D8; border-radius: 12px; overflow: hidden; list-style: none; padding: 0; margin: 0; }
    .ingredient-row  { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #fff; border-bottom: 1px solid #E7E1D8; }
    .ingredient-row:last-child { border-bottom: none; }
    .ingredient-num  { font-variant-numeric: tabular-nums; color: #56504A; width: 1.5rem; text-align: right; flex-shrink: 0; font-size: .875rem; }
    .ingredient-name { font-size: .875rem; color: #1C1A17; flex: 1; }
    /* Nutrition grid */
    .nutrition-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .nutrition-card  { background: #fff; border: 1px solid #E7E1D8; border-radius: 12px; padding: 16px; }
    .nutrition-label { font-size: .75rem; color: #56504A; margin-bottom: 4px; }
    .nutrition-value { font-family: 'Fraunces', Georgia, serif; font-size: 1.75rem; line-height: 1.2; color: #1C1A17; font-variant-numeric: tabular-nums; }
    .nutrition-unit  { font-size: 1.25rem; }
    /* Additive cards */
    .additive-card   { background: #fff; border: 1px solid #E7E1D8; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .additive-card:last-of-type { margin-bottom: 0; }
    .additive-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .additive-name   { font-weight: 600; font-size: 1rem; color: #1C1A17; }
    .additive-fn     { font-size: .75rem; color: #56504A; background: #E7E1D8; border-radius: 999px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0; }
    .additive-impact { font-size: .875rem; color: #56504A; margin-bottom: 10px; }
  </style>
</head>

        },
        {

          impact: 'A synthetic form of Vitamin K linked to hemolytic anemia and liver toxicity in cats at elevated doses. Many premium manufacturers have replaced it with natural vitamin K sources.',

        },
        {
          tier: 2, name: 'Meat By-Products (unnamed)', fn: 'Protein source',
          impact: 'Unnamed protein sources make it impossible to verify the quality, species, or consistency of the protein ingredient across production batches.',
          source: { label: 'AAFCO — Ingredient Definitions', url: 'https://www.aafco.org' },
        },
      ],
      nutrition: { protein: '38', fat: '21', moisture: '78', taurine: false },

        substantiation: 'formulation',
      },
      warnings: [
        'Contains Tier 3 additives (artificial dyes, synthetic Vitamin K3). The maximum possible CFC Score is capped at 49 regardless of nutritional quality.',
      ],
      alternatives: [
        { barcode: '0000000000001', name: "Weruva Paw Lickin' Chicken", brand: 'Weruva', score: 81, band: 'excellent' },

      ],
      dataCompleteness: 'full',
      lastReviewed: 'June 7, 2026',
    },

  }

  // ── Band config ───────────────────────────────────────────────────────────
  const BAND = {
    excellent: {
      color: '#1B7A4B', label: 'Excellent',
      // Filled check-circle
      glyph: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z',
    },
    good: {
      color: '#5FA855', label: 'Good',
      // Check mark
      glyph: 'M5 13l4 4L19 7',
    },
    poor: {
      color: '#E08A1E', label: 'Poor',
      // Exclamation triangle
      glyph: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.539-1.333-3.11 0L3.268 16c-.77 1.333.192 3 1.732 3z',
    },
    bad: {
      color: '#C0392B', label: 'Bad',
      // X circle
      glyph: 'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z',
    },
  }

  const TIER_CONFIG = {
    3: { label: 'Tier 3 — High Risk',     color: '#C0392B' },
    2: { label: 'Tier 2 — Moderate Risk', color: '#E08A1E' },
    1: { label: 'Tier 1 — Low Concern',   color: '#1B7A4B' },
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
  }

  function icon(pathD, color, size) {
    var sz = size || 6
    return '<svg aria-hidden="true" style="width:' + (sz * 4) + 'px;height:' + (sz * 4) + 'px;flex-shrink:0" fill="none" stroke="' + color + '" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="' + pathD + '"/></svg>'
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render(p, barcode) {
    var b = BAND[p.band]

    // — Warning banner —
    var warningsHtml = ''
    if (p.warnings.length) {
      var warnIcon = icon('M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.539-1.333-3.11 0L3.268 16c-.77 1.333.192 3 1.732 3z', '#92400E', 5)
      var warnItems = p.warnings.map(function(w) {
        return '<p class="text-small" style="color:#92400E;margin:0">' + esc(w) + '</p>'
      }).join('')
      warningsHtml = '<div role="alert" style="background:#FEF3C7;border-left:4px solid #E08A1E;border-radius:8px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start">' + warnIcon + '<div>' + warnItems + '</div></div>'
    }

    // — Score header —
    var bandGlyphHtml = icon(b.glyph, b.color, 6)
    var scoreHeader = '<div class="bg-surface rounded-card shadow-sm overflow-hidden">'
      + '<div style="height:6px;background:' + b.color + '" aria-hidden="true"></div>'
      + '<div class="p-5">'
      + '<div class="flex items-start justify-between gap-4 mb-4">'
      + '<div class="flex items-end gap-3">'
      + '<span class="font-display text-display text-ink leading-none" style="font-variant-numeric:tabular-nums">' + p.score + '</span>'
      + '<div class="flex items-center gap-1.5 pb-1">'
      + bandGlyphHtml
      + '<span class="font-medium text-small" style="color:' + b.color + '">' + b.label + '</span>'
      + '</div></div>'
      + '<div class="w-20 h-20 rounded-card bg-hairline flex items-center justify-center shrink-0" aria-label="Product image not available">'
      + '<span class="text-ink-soft text-micro text-center leading-tight px-1">No<br>image</span>'
      + '</div></div>'
      + '<h1 class="font-display text-h1 text-ink mb-2">' + esc(p.name) + '</h1>'
      + '<div class="flex flex-wrap gap-x-3 gap-y-1 items-center text-small text-ink-soft">'
      + '<span>' + esc(p.brand) + '</span>'
      + '<span aria-hidden="true">&middot;</span>'
      + '<span>' + esc(p.format) + '</span>'
      + '<span aria-hidden="true">&middot;</span>'
      + '<span>' + esc(p.lifeStage) + '</span>'
      + '</div></div></div>'

    // — Verdict —
    var reasonChips = p.reasons.map(function(r) {
      return '<li class="text-micro text-ink border border-hairline rounded-pill px-3 py-1">' + esc(r) + '</li>'
    }).join('')
    var verdict = '<section aria-labelledby="verdict-heading">'
      + '<h2 id="verdict-heading" class="font-display text-h2 text-ink mb-3">Verdict</h2>'
      + '<p class="text-small text-ink mb-4">' + esc(p.verdict) + '</p>'
      + '<ul class="flex flex-wrap gap-2" aria-label="Top reasons" style="list-style:none;padding:0">' + reasonChips + '</ul>'
      + '</section>'

    // — Ingredients —
    var ingRows = p.ingredients.map(function(ing, i) {
      return '<li class="ingredient-row"><span class="ingredient-num">' + (i + 1) + '.</span><span class="ingredient-name">' + esc(ing) + '</span></li>'
    }).join('')
    var ingredients = '<section aria-labelledby="ingredients-heading">'
      + '<h2 id="ingredients-heading" class="font-display text-h2 text-ink mb-4">Ingredients</h2>'
      + '<ol class="ingredient-list">' + ingRows + '</ol>'
      + '<p class="text-micro text-ink-soft mt-2">Ingredient explanations coming soon.</p>'
      + '</section>'

    // — Additive flags —
    var additivesHtml
    if (p.additives.length === 0) {
      var cleanIcon = icon('M5 13l4 4L19 7', '#1B7A4B', 5)
      additivesHtml = '<section aria-labelledby="additives-heading">'
        + '<h2 id="additives-heading" class="font-display text-h2 text-ink mb-4">Additive flags</h2>'
        + '<div class="bg-surface border border-hairline rounded-card p-4" style="display:flex;align-items:center;gap:12px">'
        + cleanIcon
        + '<p class="text-small text-ink">No Tier 2 or Tier 3 additives detected in this product.</p>'
        + '</div></section>'
    } else {
      var tiers = p.additives
        .map(function(a) { return a.tier })
        .filter(function(t, i, arr) { return arr.indexOf(t) === i })
        .sort(function(a, z) { return z - a })

      var tieredHtml = tiers.map(function(tier) {
        var tc = TIER_CONFIG[tier]
        var cards = p.additives
          .filter(function(a) { return a.tier === tier })
          .map(function(a) {
            return '<div class="additive-card">'
              + '<div class="additive-header"><span class="additive-name">' + esc(a.name) + '</span><span class="additive-fn">' + esc(a.fn) + '</span></div>'
              + '<p class="additive-impact">' + esc(a.impact) + '</p>'
              + '<a href="' + esc(a.source.url) + '" target="_blank" rel="noopener noreferrer" class="source-link text-small">Source: ' + esc(a.source.label) + ' ↗</a>'
              + '</div>'
          }).join('')
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:16px">'
          + '<span style="width:8px;height:8px;border-radius:50%;background:' + tc.color + ';display:inline-block;flex-shrink:0" aria-hidden="true"></span>'
          + '<span class="text-small font-medium" style="color:' + tc.color + '">' + tc.label + '</span>'
          + '</div>' + cards
      }).join('')

      additivesHtml = '<section aria-labelledby="additives-heading">'
        + '<h2 id="additives-heading" class="font-display text-h2 text-ink mb-2">Additive flags</h2>'
        + tieredHtml + '</section>'
    }

    // — Nutrition snapshot —
    var taurineContent
    if (p.nutrition.taurine) {
      taurineContent = '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'
        + icon('M5 13l4 4L19 7', '#1B7A4B', 5)
        + '<span class="text-small font-medium" style="color:#1B7A4B">Present</span></div>'
    } else {
      taurineContent = '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'
        + icon('M6 18L18 6M6 6l12 12', '#C0392B', 5)
        + '<span class="text-small font-medium" style="color:#C0392B">Not listed</span></div>'
    }
    var nutrition = '<section aria-labelledby="nutrition-heading">'
      + '<h2 id="nutrition-heading" class="font-display text-h2 text-ink mb-4">Nutrition snapshot</h2>'
      + '<div class="nutrition-grid">'
      + '<div class="nutrition-card"><p class="nutrition-label">Crude Protein (DM)</p><p class="nutrition-value">' + esc(p.nutrition.protein) + '<span class="nutrition-unit">%</span></p></div>'
      + '<div class="nutrition-card"><p class="nutrition-label">Crude Fat (DM)</p><p class="nutrition-value">' + esc(p.nutrition.fat) + '<span class="nutrition-unit">%</span></p></div>'
      + '<div class="nutrition-card"><p class="nutrition-label">Moisture (as-fed)</p><p class="nutrition-value">' + esc(p.nutrition.moisture) + '<span class="nutrition-unit">%</span></p></div>'
      + '<div class="nutrition-card"><p class="nutrition-label">Taurine</p>' + taurineContent + '</div>'
      + '</div>'
      + '<p class="text-micro text-ink-soft mt-2">DM = dry-matter basis.</p>'
      + '</section>'

    // — AAFCO adequacy —
    var aafco = '<section aria-labelledby="aafco-heading">'
      + '<h2 id="aafco-heading" class="font-display text-h2 text-ink mb-3">AAFCO adequacy</h2>'
      + '<div class="bg-surface border border-hairline rounded-card p-4">'
      + '<p class="text-small text-ink mb-3" style="font-style:italic">&ldquo;' + esc(p.aafco.statement) + '&rdquo;</p>'
      + '<p class="text-micro text-ink-soft">Substantiated by: ' + esc(p.aafco.substantiation) + '</p>'
      + '</div></section>'

    // — Better alternatives (shown for Poor or Bad) —
    var alternativesHtml = ''
    if (p.alternatives.length > 0) {
      var altCards = p.alternatives.map(function(alt) {
        var ab = BAND[alt.band]
        return '<li><a href="./product.html?barcode=' + esc(alt.barcode) + '" class="card-link items-center gap-4 bg-surface border border-hairline rounded-card p-4">'
          + '<div style="background:' + ab.color + ';width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0" aria-label="Score ' + alt.score + ', ' + ab.label + '">'
          + '<span class="font-display text-h2 leading-none" style="color:#fff;font-variant-numeric:tabular-nums">' + alt.score + '</span>'
          + '</div>'
          + '<div class="min-w-0 flex-1">'
          + '<p class="text-ink font-medium text-small truncate">' + esc(alt.name) + '</p>'
          + '<p class="text-ink-soft text-micro">' + esc(alt.brand) + '</p>'
          + '<span style="background:' + ab.color + ';color:#fff;font-size:.75rem;padding:2px 8px;border-radius:999px;display:inline-block;margin-top:4px">' + ab.label + '</span>'
          + '</div>'
          + '<svg aria-hidden="true" style="width:20px;height:20px;flex-shrink:0;color:#56504A" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>'
          + '</a></li>'
      }).join('')
      alternativesHtml = '<section aria-labelledby="alternatives-heading">'
        + '<h2 id="alternatives-heading" class="font-display text-h2 text-ink mb-4">Better alternatives</h2>'
        + '<ul class="flex flex-col gap-3" style="list-style:none;padding:0">' + altCards + '</ul>'
        + '</section>'
    }

    // — Footer metadata —
    var completenessIcon = p.dataCompleteness === 'full'
      ? icon('M5 13l4 4L19 7', '#1B7A4B', 4)
      : icon('M12 9v2m0 4h.01', '#E08A1E', 4)
    var meta = '<div class="border-t border-hairline pt-4" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center">'
      + '<div style="display:flex;align-items:center;gap:6px">'
      + completenessIcon
      + '<span class="text-micro text-ink-soft">' + (p.dataCompleteness === 'full' ? 'Full data' : 'Partial data') + '</span>'
      + '</div>'
      + '<span class="text-micro text-ink-soft">Last reviewed: ' + esc(p.lastReviewed) + '</span>'
      + '<span class="text-micro text-ink-soft">Barcode: ' + esc(barcode) + '</span>'
      + '</div>'

    return [scoreHeader, warningsHtml, verdict, ingredients, additivesHtml, nutrition, aafco, alternativesHtml, meta].join('')
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  var barcode = new URLSearchParams(window.location.search).get('barcode') || '0000000000000'
  var product  = PRODUCTS[barcode]
  var article  = document.getElementById('product-article')

  if (!product) {
    document.title = 'Product Not Found — Cat Food Center'
    article.innerHTML = '<div class="text-center py-16">'
      + '<p class="font-display text-h2 text-ink mb-3">Product not found</p>'
      + '<p class="text-small text-ink-soft mb-6">We don’t have a record for barcode <code>' + esc(barcode) + '</code> yet.</p>'
      + '<a href="./index.html" class="btn-link rounded-pill bg-accent text-white text-small font-medium px-6 py-3" style="display:inline-block;margin-top:8px">Back to home</a>'
      + '</div>'
  } else {
    document.title = product.name + ' — Cat Food Center'
    article.innerHTML = render(product, barcode)
  }
  </script>

</body>
</html>
